AWSTemplateFormatVersion: '2010-09-09'
Description: 'EC2 Instance deployed into an imported VPC'
Resources:
  MyInstanceSecurityGroup:
    Type: 'AWS::EC2::SecurityGroup'
    Properties:
      GroupDescription: Allow SSH
      VpcId: !ImportValue vpc-stack # IMPORTING FROM VPC STACK
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0

  MyEC2Instance:
    Type: 'AWS::EC2::Instance'
    Properties:
      InstanceType: t2.micro
      ImageId: ami-0440d3b780d96b29d # Ensure this AMI exists in your region
      SubnetId: !ImportValue vpc-stack-PublicSubnetID # IMPORTING FROM VPC STACK
      SecurityGroupIds:
        - !Ref MyInstanceSecurityGroup
      Tags:
        - Key: Name
          Value: MyPracticeInstance
